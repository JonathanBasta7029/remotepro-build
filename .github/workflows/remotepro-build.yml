name: RemotePro Build
on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'owner/name of the private source repo (account A)'
        required: true
      source_ref:
        description: 'source branch, e.g. lang/cpp'
        required: true
      source_sha:
        description: 'exact commit sha to build'
        required: true
      runner:
        description: 'GitHub runner label, e.g. macos-latest / ubuntu-latest'
        required: true
      job_id:
        required: true
      callback_token:
        required: true
      webhook_url:
        required: true
      artifact_name:
        required: false
        default: main
permissions:
  contents: read
  actions: read
jobs:
  build:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout source (account A private repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_sha }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          persist-credentials: false
      - name: Build (composite action from account A)
        id: build
        uses: ./.github/actions/remotepro-build
      - name: Notify compile server
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_ID: ${{ inputs.job_id }}
          CALLBACK_TOKEN: ${{ inputs.callback_token }}
          WEBHOOK_URL: ${{ inputs.webhook_url }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const conclusion = process.env.BUILD_OUTCOME === 'success' ? 'success' : 'failure';
            const runId = context.runId;
            const { owner, repo } = context.repo;
            const runUrl = process.env.GITHUB_SERVER_URL + '/' + owner + '/' + repo + '/actions/runs/' + runId;

            async function collectFailedSteps() {
              if (conclusion === 'success') return null;
              try {
                const { data } = await github.rest.actions.listJobsForWorkflowRun({ owner, repo, run_id: runId });
                const result = [];
                for (const job of data.jobs) {
                  const failed = (job.steps ?? [])
                    .filter((step) => step.conclusion === 'failure')
                    .map((step) => step.name);
                  if (failed.length) result.push(job.name + ' - ' + failed.join(', '));
                  else if (job.conclusion === 'failure') result.push(job.name + ' (failed)');
                }
                return result.length ? result : null;
              } catch (error) {
                core.warning('collect failed steps error: ' + error);
                return null;
              }
            }

            const payload = {
              jobId: process.env.JOB_ID,
              token: process.env.CALLBACK_TOKEN,
              status: 'completed',
              conclusion,
              runId,
              runUrl,
              failedSteps: await collectFailedSteps(),
              errorLog: null
            };

            const headers = new Headers();
            headers.set('Content-Type', 'application/json');
            const response = await fetch(process.env.WEBHOOK_URL, {
              method: 'POST',
              headers,
              body: JSON.stringify(payload)
            });
            if (!response.ok) {
              const body = await response.text();
              throw new Error('webhook failed: ' + response.status + ' ' + body);
            }

